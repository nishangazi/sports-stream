<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Mode Live Stream</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        .stream-container {
            width: 95vw;    
            height: 80vh;   /* Leaves space for the text below */
            max-width: 1400px;
            position: relative;
            background: #000;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Center-aligned title style rules */
        .video-title {
            width: 95vw;
            max-width: 1400px;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;   /* Gap between player and text */
            text-align: center; /* Centers the text on the screen */
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- 1. Video Player Box -->
    <div class="stream-container">
        <iframe 
            src="http://103.124.227.154:5080/LiveApp/play.html?id=ipllive" 
            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

    <!-- 2. Centered Video Title -->
    <div class="video-title">Sports Live Stream</div>

</body>
</html>
